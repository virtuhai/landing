<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

  <!-- ============================================================
       VIRTUHAI Icon Sprite
       Single <symbol> per icon, referenced via <use href="#icon-name">.
       All icons share a 24x24 viewBox and use currentColor so they
       inherit color/theme from their parent element.
       ============================================================ -->

  <!-- UI: navigation / chrome -->
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <symbol id="icon-close" viewBox="0 0 24 24">
    <path d="M5 5l14 14M19 5L5 19" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </symbol>

  <symbol id="icon-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <path d="M12 2.5v2.6M12 18.9v2.6M4.6 4.6l1.85 1.85M17.55 17.55l1.85 1.85M2.5 12h2.6M18.9 12h2.6M4.6 19.4l1.85-1.85M17.55 6.45l1.85-1.85"
          fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </symbol>

  <symbol id="icon-moon" viewBox="0 0 24 24">
    <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-arrow-right" viewBox="0 0 24 24">
    <path d="M4 12h15.5M13.5 5.5L20 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-chevron-down" viewBox="0 0 24 24">
    <path d="M5 9l7 7 7-7" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-play" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M10 8.3l6 3.7-6 3.7z" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- Feature badges -->
  <symbol id="icon-shield-check" viewBox="0 0 24 24">
    <path d="M12 3l7 3v5.2c0 4.6-3 8.2-7 9.8-4-1.6-7-5.2-7-9.8V6z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M8.7 12.2l2.3 2.3 4.3-4.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-radar" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.55"/>
    <circle cx="12" cy="12" r="5.6" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.75"/>
    <circle cx="12" cy="12" r="2.1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="0.9" fill="currentColor" stroke="none"/>
  </symbol>

  <symbol id="icon-shield-alert" viewBox="0 0 24 24">
    <path d="M12 3l7 3v5.2c0 4.6-3 8.2-7 9.8-4-1.6-7-5.2-7-9.8V6z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M9 9.5l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-lock" viewBox="0 0 24 24">
    <rect x="5.5" y="11" width="13" height="9.5" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M8 11V7.6a4 4 0 0 1 8 0V11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="12" cy="15.4" r="1.3" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- Orbit / technology nodes -->
  <symbol id="icon-drone" viewBox="0 0 24 24">
    <circle cx="12" cy="13" r="2.4" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M9.8 11.3L6 7.5M14.2 11.3L18 7.5M9.8 14.7L6 18.5M14.2 14.7L18 18.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="5.2" cy="6.7" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="18.8" cy="6.7" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="5.2" cy="19.3" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="18.8" cy="19.3" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/>
  </symbol>

  <symbol id="icon-cloud-bolt" viewBox="0 0 24 24">
    <path d="M7.5 16.5a3.8 3.8 0 0 1-.6-7.55 4.8 4.8 0 0 1 9.3-1.5 3.6 3.6 0 0 1-.7 9.05z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M13 13.2l-2.6 3.4h2l-1.6 3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-cloud-particles" viewBox="0 0 24 24">
    <path d="M7.5 14.5a3.6 3.6 0 0 1-.5-7.15 4.6 4.6 0 0 1 8.9-1.4 3.4 3.4 0 0 1-.7 8.55z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
    <circle cx="7.5" cy="18.2" r="0.9" fill="currentColor" stroke="none"/>
    <circle cx="11.5" cy="18.9" r="0.9" fill="currentColor" stroke="none"/>
    <circle cx="15.5" cy="18.2" r="0.9" fill="currentColor" stroke="none"/>
  </symbol>

  <symbol id="icon-alert-triangle" viewBox="0 0 24 24">
    <path d="M12 3.5l9.3 16.2H2.7z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M12 9.5v4.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="12" cy="16.8" r="1" fill="currentColor" stroke="none"/>
  </symbol>

  <symbol id="icon-watch" viewBox="0 0 24 24">
    <rect x="7.5" y="7.5" width="9" height="9" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12 10v2.3l1.6 1.2" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 7.5V4.8h6V7.5M9 16.5v2.7h6v-2.7" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-home" viewBox="0 0 24 24">
    <path d="M4.5 11.5L12 4l7.5 7.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M6.5 10v9h11v-9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M10 19v-4.5h4V19" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-car" viewBox="0 0 24 24">
    <path d="M4 15.5l1.4-4.8A2 2 0 0 1 7.3 9.3h9.4a2 2 0 0 1 1.9 1.4l1.4 4.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <rect x="3.2" y="15.5" width="17.6" height="3.6" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="7.3" cy="19.3" r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="16.7" cy="19.3" r="1.2" fill="currentColor" stroke="none"/>
  </symbol>

</svg>
